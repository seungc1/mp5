version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo $CODEBUILD_SRC_DIR
      - ls -la
      - npm install
  build:
    commands:
      - echo $CODEBUILD_SRC_DIR
      - ls -la
      - npm run build
    finally:
      - echo This is the finally block execution!
artifacts:
  base-directory: frontend/dist
  files:
    - '**/*'